<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="160" height="20" role="img" aria-label="optimization score">
  <title>OptiDash Optimization Score</title>
  
  <!-- Define gradients for flat design -->
  <defs>
    <linearGradient id="leftGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#555;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#F44336;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left rectangle (dark gray background) -->
  <rect x="0" y="0" width="80" height="20" fill="url(#leftGradient)" rx="3"/>
  
  <!-- Right rectangle (grade color) -->
  <rect x="80" y="0" width="80" height="20" fill="url(#rightGradient)" rx="3"/>
  
  <!-- Separator line -->
  <line x1="80" y1="0" x2="80" y2="20" stroke="#000" stroke-opacity="0.1" stroke-width="1"/>
  
  <!-- Left text: "optimized" -->
  <text x="40" y="10" text-anchor="middle" dominant-baseline="central" 
        font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#fff">
    optimized
  </text>
  
  <!-- Right text: grade and score -->
  <text x="120" y="10" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#fff">
    F 31/100
  </text>
</svg>